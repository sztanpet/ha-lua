version: "2"

linters:
  default: standard # errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - misspell
    - noctx
    - exhaustive
  settings:
    errcheck:
      # Deferred cleanup where the error is unconditionally uninteresting:
      # Rollback after Commit is a no-op error, Rows.Close errors surface
      # via Rows.Err, double-Close of DB handles is harmless, and
      # websocket CloseNow is documented best-effort.
      exclude-functions:
        - (*database/sql.Tx).Rollback
        - (*database/sql.Rows).Close
        - (*database/sql.DB).Close
        - (*github.com/coder/websocket.Conn).CloseNow
        - (*github.com/fsnotify/fsnotify.Watcher).Close
        - (*os.Root).Close
        - (io.Closer).Close
        # SMTP cleanup: Client.Close after Quit errors by design, and a
        # close error on an already-failed connection changes nothing.
        - (*net/smtp.Client).Close
        - (net.Conn).Close
        - (net.Listener).Close
    staticcheck:
      checks: ["all"]

formatters:
  enable:
    - goimports

issues:
  max-same-issues: 0
