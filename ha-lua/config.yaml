name: "HA Lua"
description: "Lua scripting engine for Home Assistant"
version: "3.0.0"
slug: "ha-lua"
init: false
# Pull the prebuilt per-arch image from GHCR (pushed by .github/release.yml)
# instead of building on-device. {arch} is substituted by the Supervisor; the
# pulled tag matches version: above. Keep this in sync with the image name in
# the release workflow (ghcr.io/<owner>/<arch>-<slug>).
image: "ghcr.io/sztanpet/{arch}-ha-lua"
arch:
  - aarch64
  - amd64
homeassistant_api: true        # provides $SUPERVISOR_TOKEN + ws://supervisor/core/websocket
startup: services
boot: auto
ingress: true                  # authenticated sidebar panel
ingress_port: 8099             # internal port the Supervisor proxies; MUST match config.IngressPort default
panel_icon: mdi:thermostat
panel_title: "Heating"
ports:
  "8100/tcp": 8100             # stable LAN port for dashboard Webpage cards (unauthenticated, LAN-trust)
ports_description:
  "8100/tcp": "Script-driven UI (e.g. thermostat). Unauthenticated — keep on the LAN only."
map:
  # Mount the Home Assistant config directory (the one the File Editor and
  # Samba expose as "config") at /config inside the container, so scripts
  # live in the user's main config tree under ha-lua/ — the same place the
  # ESPHome add-on keeps its YAML. The modern homeassistant_config type
  # defaults to /homeassistant; the path override pins it back to /config.
  # (addon_config would instead bind a private /addon_configs/<slug> folder
  # that users cannot easily find or edit.)
  - type: homeassistant_config
    read_only: false
    path: /config
options:
  log_level: "info"
  timezone: ""
  http_port: 8100
  state_history:
    retention_days: 2
    purge_interval: "1h"
  debug:
    pprof_addr: ""
schema:
  log_level: "str"
  timezone: "str?"
  http_port: "int"
  state_history:
    retention_days: "int"
    purge_interval: "str"
  debug:
    pprof_addr: "str?"
