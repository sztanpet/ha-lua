<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Heating</title>
<style>
  /* Neutrals share one hue (262); the ramp is pure lightness steps. The
     accent is the only standalone chromatic anchor, and --now is derived
     from it so the highlight tint tracks the accent's hue automatically. */
  :root { color-scheme: light dark;
          --bg:oklch(0.970 0.003 262); --card:oklch(1 0 0);
          --ink:oklch(0.234 0.007 262); --muted:oklch(0.573 0.008 262);
          --accent:oklch(0.642 0.187 31); --accent-ink:oklch(1 0 0);
          --line:oklch(0.921 0.005 262); --btn:oklch(0.958 0.003 262);
          --link:oklch(0.581 0.229 263);
          --now:oklch(from var(--accent) 0.968 0.016 h);
          --btn-ink:var(--ink); --surface:var(--card); }
  @media (prefers-color-scheme: dark) {
    :root { --bg:oklch(0.204 0.007 262); --card:oklch(0.259 0.010 262);
            --ink:oklch(0.928 0.003 262); --muted:oklch(0.695 0.009 262);
            --line:oklch(0.336 0.011 262); --btn:oklch(0.305 0.012 262);
            --link:oklch(0.729 0.141 258);
            --now:oklch(from var(--accent) 0.294 0.030 h);
            --surface:var(--btn); }
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:16px/1.4 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
         padding:12px; max-width:600px; margin:0 auto; }
  h1 { font-size:1.3rem; margin:8px 4px 16px; }
  .topbar { display:flex; align-items:baseline; justify-content:space-between; gap:8px; }
  #lang { padding:6px 8px; border:1px solid var(--line); border-radius:8px;
          background:var(--surface); color:var(--ink); cursor:pointer; }
  .card { background:var(--card); border-radius:14px; padding:14px;
          margin-bottom:14px; box-shadow:0 1px 3px rgba(0,0,0,.08); }
  /* The dragged card lifts above its neighbours and stops capturing text
     selection; while it moves, transitions are off so it tracks the pointer. */
  .card.dragging { position:relative; z-index:10; opacity:.96; user-select:none;
          box-shadow:0 8px 24px rgba(0,0,0,.22); }
  .head { display:flex; justify-content:space-between; align-items:baseline;
          margin-bottom:12px; }
  .head-main { display:flex; align-items:center; gap:8px; min-width:0; }
  /* The reorder grip. touch-action:none is essential: it stops a touch-drag on
     the handle from scrolling the page so the pointer drag can take over. */
  .grip { display:inline-flex; align-items:center; padding:2px; color:var(--muted);
          cursor:grab; touch-action:none; user-select:none; }
  .grip:active { cursor:grabbing; }
  .zone { font-weight:600; font-size:1.1rem; }
  .status { color:var(--muted); font-size:.95rem; }
  .status b { color:var(--ink); }
  .override { border:1px solid var(--line); border-radius:12px; margin:0 0 12px;
          padding:6px 12px 12px; min-width:0; }
  .override legend { padding:0 6px; color:var(--muted); font-size:.8rem; font-weight:600;
          text-transform:uppercase; letter-spacing:.04em; }
  .override-controls { display:flex; align-items:center; gap:10px 12px; flex-wrap:wrap; }
  .override-row { display:flex; gap:8px; flex:1 1 180px; }
  .override-row button { flex:1; padding:11px 0; font-size:.95rem; font-weight:600;
          border:none; border-radius:10px; background:var(--accent);
          color:var(--accent-ink); cursor:pointer; }
  .override-row button.alt { background:var(--btn); color:var(--btn-ink); flex:0 0 48px;
          display:flex; align-items:center; justify-content:center; }
  .overriding { display:flex; align-items:center; gap:12px; flex:1 1 180px;
          background:var(--now); border-radius:10px; padding:8px 12px; }
  .overriding .cd { font-size:1.4rem; font-weight:700; font-variant-numeric:tabular-nums; }
  .overriding button { margin-left:auto; padding:10px 16px; border:none;
          border-radius:8px; background:var(--surface); color:var(--ink); cursor:pointer; }
  .stepper { display:flex; align-items:center; gap:8px; }
  .stepper button { width:42px; height:42px; font-size:1.4rem; border:1px solid var(--line);
          border-radius:10px; background:var(--surface); color:var(--ink); cursor:pointer; }
  .stepper .val-input { width:72px; height:42px; padding:4px 2px; font-size:1.3rem;
          font-weight:600; text-align:center; border:1px solid var(--line);
          border-radius:10px; background:var(--surface); color:var(--ink); }
  .today { display:flex; flex-wrap:wrap; gap:6px 10px; font-size:.9rem;
           color:var(--muted); margin-bottom:8px; }
  .today .step.now { color:var(--accent); font-weight:700; cursor:help; }
  .muted { color:var(--muted); font-style:italic; margin-bottom:8px; }
  .edit-btn { display:flex; align-items:center; justify-content:center; gap:8px;
              width:100%; margin-top:4px; padding:11px; font-size:.95rem; font-weight:600;
              border:1px solid var(--line); border-radius:10px; user-select:none;
              background:var(--btn); color:var(--btn-ink); cursor:pointer; }
  .edit-btn .ico { display:inline-flex; font-size:1.4rem; line-height:1; }
  .editor { border-top:1px solid var(--line); margin-top:12px; padding-top:12px; }
  .row { display:flex; gap:8px; align-items:center; margin-bottom:6px; }
  .row select { padding:8px; border:1px solid var(--line); border-radius:8px;
            background:var(--surface); color:var(--ink); }
  .row input[type=time] { flex:1; padding:8px; border:1px solid var(--line); border-radius:8px;
            background:var(--surface); color:var(--ink); }
  .row input[type=number] { width:80px; padding:8px; border:1px solid var(--line); border-radius:8px;
            background:var(--surface); color:var(--ink); }
  .row .rm, .editor .add { border:none; background:var(--btn); color:var(--btn-ink); border-radius:8px;
            padding:8px 12px; cursor:pointer; }
  .editor .add { display:block; margin-bottom:8px; }
  .editor-actions { display:flex; gap:8px; margin-top:8px; }
  .editor-actions button { flex:1; padding:12px; border:none; border-radius:10px;
            font-weight:600; cursor:pointer; }
  .editor-actions .save { background:var(--accent); color:var(--accent-ink); }
  .editor-actions .cancel { background:var(--btn); color:var(--btn-ink); }
  #err { position:fixed; left:12px; right:12px; bottom:12px; background:#c0392b;
         color:#fff; padding:12px; border-radius:10px; display:none; }
  .skel { display:inline-block; background:var(--line); border-radius:8px;
          animation:pulse 1.2s ease-in-out infinite; }
  .skel-text { height:1.1rem; vertical-align:middle; }
  .head .skel-text.zone { width:90px; }
  .head .skel-text.status { width:60px; }
  .override-row .skel-btn { flex:1; height:52px; border-radius:10px; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.45; } }
</style>
</head>
<body>
<header class="topbar"><h1>Heating</h1><select id="lang" aria-label="Language"></select></header>
<div id="app">
  <div class="card placeholder">
    <div class="head"><span class="zone skel skel-text"></span><span class="status skel skel-text"></span></div>
    <div class="override-row"><span class="skel skel-btn"></span><span class="skel skel-btn"></span><span class="skel skel-btn"></span></div>
    <div class="today">loading…</div>
  </div>
</div>
<div id="err"></div>
<script>
const PRESETS = [10, 30, 60];

// UI strings keyed by locale. {name} placeholders are filled in by t().
const MESSAGES = {
  en: {
    "title": "Heating",
    "loading": "loading…",
    "not_controlled": "mode {mode} — not controlled",
    "overriding_to": "overriding to {temp}°",
    "stop_override": "cancel",
    "preset_minutes": "{n}m",
    "custom_minutes_title": "custom minutes",
    "custom_minutes_prompt": "Override for how many minutes?",
    "override": "Temporary override",
    "reorder": "Drag to reorder",
    "edit_override_temp": "Set the override target",
    "no_schedule": "no schedule set",
    "now_period": "currently active period",
    "edit_schedule": "Edit schedule",
    "add_entry": "+ add entry",
    "save": "Save",
    "cancel": "Cancel",
    "load_schedule_failed": "Could not load schedule",
    "http_error": "Error {status}: {msg}",
    "mode.heat": "heat", "mode.off": "off", "mode.cool": "cool",
    "mode.auto": "auto", "mode.idle": "idle", "mode.unknown": "unknown",
    "mode.on": "on", "action.heating": "heating",
    "daygroup.combined": "Day groups", "daygroup.individual": "Single days",
    "day.everyday": "Every day", "day.weekdays": "Mon–Fri", "day.weekend": "Sat–Sun",
    "day.0": "Monday", "day.1": "Tuesday", "day.2": "Wednesday",
    "day.3": "Thursday", "day.4": "Friday", "day.5": "Saturday", "day.6": "Sunday",
    "zone.bedroom": "Bedroom", "zone.livingroom": "Living room",
    "zone.childrens": "Children's",
  },
  hu: {
    "title": "Fűtés",
    "loading": "betöltés…",
    "not_controlled": "{mode} mód — nincs vezérelve",
    "overriding_to": "felülbírálás {temp}°-ra",
    "stop_override": "leállítás",
    "preset_minutes": "{n}p",
    "custom_minutes_title": "egyéni időtartam",
    "custom_minutes_prompt": "Hány percig legyen felülbírálva?",
    "override": "Ideiglenes felülbírálás",
    "reorder": "Húzással átrendezhető",
    "edit_override_temp": "Felülbírálás célhőmérséklete",
    "no_schedule": "nincs beállított ütemezés",
    "now_period": "jelenleg aktív időszak",
    "edit_schedule": "Ütemezés szerkesztése",
    "add_entry": "+ új bejegyzés",
    "save": "Mentés",
    "cancel": "Mégse",
    "load_schedule_failed": "Az ütemezés betöltése sikertelen",
    "http_error": "Hiba {status}: {msg}",
    "mode.heat": "fűtés", "mode.off": "off", "mode.cool": "hűtés",
    "mode.auto": "automatikus", "mode.idle": "tétlen", "mode.unknown": "ismeretlen",
    "mode.on": "on", "action.heating": "fűt",
    "daygroup.combined": "Napcsoportok", "daygroup.individual": "Egyes napok",
    "day.everyday": "Minden nap", "day.weekdays": "Hétköznap", "day.weekend": "Hétvége",
    "day.0": "Hétfő", "day.1": "Kedd", "day.2": "Szerda",
    "day.3": "Csütörtök", "day.4": "Péntek", "day.5": "Szombat", "day.6": "Vasárnap",
    "zone.bedroom": "Hálószoba", "zone.livingroom": "Nappali",
    "zone.childrens": "Gyerekszoba",
  },
};

// Native names shown in the language picker, one per MESSAGES locale.
const LANG_NAMES = { en: "English", hu: "Magyar" };

// Resolve the locale once: ?lang= overrides and is remembered, otherwise the
// stored choice, otherwise the browser language. Anything we can't serve
// falls back to English.
const LOCALE = (() => {
  const param = new URLSearchParams(location.search).get("lang");
  if (param) localStorage.setItem("lang", param);
  const pref = (param || localStorage.getItem("lang") || navigator.language || "en").toLowerCase();
  return MESSAGES[pref.slice(0, 2)] ? pref.slice(0, 2) : "en";
})();

function t(key, params, fallback) {
  const table = MESSAGES[LOCALE] || MESSAGES.en;
  let str = table[key];
  if (str == null) str = MESSAGES.en[key];
  if (str == null) str = (fallback != null ? fallback : key);
  if (params) str = str.replace(/\{(\w+)\}/g, (whole, name) => params[name] != null ? params[name] : whole);
  return str;
}

// hvac modes come straight from Home Assistant; show the raw value when we
// have no translation for it.
const modeLabel = (mode) => t("mode." + mode, null, mode);

// The status badge shown in each card head. In heat mode we show "on", or
// "heating" while the device is actively calling for heat (hvac_action), so
// the raw "heat" mode word never appears; other modes fall back to modeLabel.
function statusLabel(status) {
  if (status.mode === "heat") {
    return status.hvac_action === "heating" ? t("action.heating") : t("mode.on");
  }
  return modeLabel(status.mode);
}

// Each editor entry targets one of these day groups; .days lists the
// underlying 0=Mon..6=Sun indices the entry expands to on save. Labels are
// resolved through t() under the "day.<value>" keys.
const DAY_GROUPS = [
  { value: "everyday", days: [0, 1, 2, 3, 4, 5, 6] },
  { value: "weekdays", days: [0, 1, 2, 3, 4] },
  { value: "weekend",  days: [5, 6] },
  { value: "0", days: [0] },
  { value: "1", days: [1] },
  { value: "2", days: [2] },
  { value: "3", days: [3] },
  { value: "4", days: [4] },
  { value: "5", days: [5] },
  { value: "6", days: [6] },
];
const editing = new Set();  // zones with an open schedule editor (suppresses polling)
const busy = new Set();      // zones mid-transition: open fetch in flight or close animating
let lastState = null;

// Tiny hyperscript builder: h(tag, attrs?, ...children) returns a DOM node.
// Text children become auto-escaped text nodes; element children are appended
// as-is; null/false children are skipped (so `cond ? node : null` works). In
// attrs, `class` sets className, `html` sets innerHTML (for trusted SVG
// markup), on* set event handlers, and null/false values are skipped;
// everything else becomes a plain attribute.
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  for (const key in attrs) {
    const val = attrs[key];
    if (val == null || val === false) continue;
    if (key === "class") el.className = val;
    else if (key === "html") el.innerHTML = val;
    else if (key.startsWith("on")) el[key.toLowerCase()] = val;
    else el.setAttribute(key, val);
  }
  for (const child of children.flat()) {
    if (child == null || child === false) continue;
    el.append(child.nodeType ? child : document.createTextNode(child));
  }
  return el;
}

// Cache a fresh state returned by a mutating API call and re-render. Returns
// the state so callers can branch on success.
function applyState(newState) {
  if (newState) { lastState = newState; render(newState); }
  return newState;
}

// Inline single-colour icons; currentColor makes them inherit the button's
// text colour so they track the light/dark theme.
const ICON_PENCIL =
  '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" ' +
  'stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
  '<path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>';
const ICON_STOPWATCH =
  '<svg viewBox="0 0 24 24" width="1.4em" height="1.4em" fill="none" stroke="currentColor" ' +
  'stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
  '<circle cx="12" cy="14" r="7"/><path d="M12 14v-3.5"/>' +
  '<path d="M9.5 2.5h5"/><path d="M12 2.5v2"/></svg>';
// The six-dot drag handle; fill (not stroke) so the dots read at small sizes.
const ICON_GRIP =
  '<svg viewBox="0 0 24 24" width="1.2em" height="1.2em" fill="currentColor">' +
  '<circle cx="9" cy="6" r="1.6"/><circle cx="15" cy="6" r="1.6"/>' +
  '<circle cx="9" cy="12" r="1.6"/><circle cx="15" cy="12" r="1.6"/>' +
  '<circle cx="9" cy="18" r="1.6"/><circle cx="15" cy="18" r="1.6"/></svg>';

// Zone display names are translated under "zone.<key>"; zones with no
// translation fall back to the capitalised, de-underscored key.
const title = (zone) => t("zone." + zone, null, zone.charAt(0).toUpperCase() + zone.slice(1).replace(/_/g, " "));

// The climate device's accepted setpoint range for a zone (its min_temp/
// max_temp), read from the last rendered state. Both the override stepper and
// the schedule editor clamp to it so the UI never offers a value HA would
// reject. Falls back to a permissive 5..35 before the first poll has bounds.
function zoneBounds(zone) {
  const status = lastState && lastState.zones && lastState.zones[zone];
  const num = (v, dflt) => (status && Number.isFinite(Number(v)) ? Number(v) : dflt);
  return [num(status && status.min_temp, 5), num(status && status.max_temp, 35)];
}

function showErr(msg) {
  const errEl = document.getElementById("err");
  errEl.textContent = msg; errEl.style.display = "block";
  setTimeout(() => { errEl.style.display = "none"; }, 4000);
}

async function send(path, method, payload) {
  const resp = await fetch("./" + path, {
    method, headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });
  if (!resp.ok) { showErr(t("http_error", { status: resp.status, msg: await resp.text() })); return null; }
  return resp.json();
}

async function poll() {
  if (editing.size || busy.size) return;   // don't clobber an open or transitioning editor
  try {
    const resp = await fetch("./api/state");
    if (resp.ok) { lastState = await resp.json(); render(lastState); }
  } catch (err) { /* transient; next poll retries */ }
}

function fmtCountdown(sec) {
  sec = Math.max(0, Math.floor(sec));
  const minutes = Math.floor(sec / 60), seconds = sec % 60;
  return minutes + ":" + String(seconds).padStart(2, "0");
}

// Render a stored "HH:MM" (24h) transition in the user's regional clock
// convention (12h or 24h), following the browser default locale rather than
// the chosen UI language.
const timeFmt = new Intl.DateTimeFormat(undefined, { hour: "2-digit", minute: "2-digit" });
function fmtTime(hhmm) {
  const parts = String(hhmm).split(":");
  return timeFmt.format(new Date(2000, 0, 1, Number(parts[0]) || 0, Number(parts[1]) || 0));
}

// Card drag-to-reorder. One drag at a time, tracked in `drag`. The grip's
// pointerdown starts it; move/up are listened for on the document so the drag
// keeps tracking even if the pointer slips off the card, and we also try to
// capture the pointer (ignored where unsupported). The zone is held busy for
// the whole gesture so polling/render can't rebuild the cards mid-drag.
let drag = null;

function startDrag(ev, zone) {
  if (drag || editing.size || busy.size) return;    // one drag, never mid-edit
  if (ev.button != null && ev.button !== 0) return; // primary pointer only
  const card = ev.currentTarget.closest(".card");
  if (!card) return;
  ev.preventDefault();
  try { card.setPointerCapture(ev.pointerId); } catch (err) { /* capture optional */ }
  busy.add(zone);
  drag = { zone, card, pointerId: ev.pointerId, startY: ev.clientY };
  card.classList.add("dragging");
  document.addEventListener("pointermove", onDragMove);
  document.addEventListener("pointerup", endDrag);
  document.addEventListener("pointercancel", endDrag);
}

// Follow the pointer and, when the dragged card's centre crosses a neighbour's
// centre, swap their DOM positions (at most one swap per move). Reordering
// shifts the dragged card's own layout box by the neighbour's height, so startY
// is nudged by the same amount to keep the translate continuous — no visual
// jump on the swap.
function onDragMove(ev) {
  const card = drag.card;
  card.style.transform = "translateY(" + (ev.clientY - drag.startY) + "px)";
  const rect = card.getBoundingClientRect();
  const mid = rect.top + rect.height / 2;
  const next = card.nextElementSibling;
  if (next) {
    const nr = next.getBoundingClientRect();
    if (mid > nr.top + nr.height / 2) {
      next.after(card);
      drag.startY += nr.height;
      card.style.transform = "translateY(" + (ev.clientY - drag.startY) + "px)";
      return;
    }
  }
  const prev = card.previousElementSibling;
  if (prev) {
    const pr = prev.getBoundingClientRect();
    if (mid < pr.top + pr.height / 2) {
      prev.before(card);
      drag.startY -= pr.height;
      card.style.transform = "translateY(" + (ev.clientY - drag.startY) + "px)";
    }
  }
}

// End the gesture: drop the visual lift, persist the new order to the backend
// (so every browser/user sees it), and re-render from the response. busy is
// held until the PUT resolves so no poll renders a half state. A failed PUT
// leaves lastState untouched, so the re-render reverts the cards to the
// server's order.
async function endDrag() {
  const d = drag;
  if (!d) return;
  drag = null;
  try { d.card.releasePointerCapture(d.pointerId); } catch (err) { /* may not be captured */ }
  document.removeEventListener("pointermove", onDragMove);
  document.removeEventListener("pointerup", endDrag);
  document.removeEventListener("pointercancel", endDrag);
  d.card.classList.remove("dragging");
  d.card.style.transform = "";
  const order = Array.from(document.querySelectorAll(".card[data-zone]")).map(c => c.dataset.zone);
  const newState = await send("api/order", "PUT", { order });
  busy.delete(d.zone);
  if (newState) lastState = newState;
  render(lastState);
}

function render(state) {
  if (editing.size || busy.size) return;
  const app = document.getElementById("app");
  app.innerHTML = "";
  // The backend supplies the persisted display order (alphabetical until the
  // user drags a card); fall back to sorted keys if it's ever missing.
  const order = Array.isArray(state.order) ? state.order : Object.keys(state.zones).sort();
  order.forEach(zone => {
    if (state.zones[zone]) app.appendChild(zoneCard(zone, state.zones[zone]));
  });
}

function zoneCard(zone, status) {
  const current = (status.current_temp != null) ? status.current_temp.toFixed(1) + "°" : "";
  // The grip starts a pointer drag to reorder cards; it derives its card from
  // the DOM at drag time, so it needs no reference to the card built below.
  const grip = h("span", { class: "grip", title: t("reorder"), "aria-label": t("reorder"),
    html: ICON_GRIP });
  grip.onpointerdown = (ev) => startDrag(ev, zone);
  const head = h("div", { class: "head" },
    h("div", { class: "head-main" }, grip, h("span", { class: "zone" }, title(zone))),
    h("span", { class: "status" }, h("b", null, statusLabel(status)), " " + current));

  let body;
  if (status.mode !== "heat") {
    body = h("div", { class: "muted" }, t("not_controlled", { mode: modeLabel(status.mode) }));
  } else {
    // Duration controls (or the live countdown) and the target-temp stepper
    // share one row inside a labelled "override" outline.
    let durations;
    if (status.override && status.override.active) {
      const ends = Date.now() + (status.override.remaining_s || 0) * 1000;
      durations = h("div", { class: "overriding" },
        h("span", { class: "cd", "data-ends": ends }, fmtCountdown(status.override.remaining_s || 0)),
        h("span", null, t("overriding_to", { temp: status.override_temp })),
        h("button", { onclick: () => send("api/override/cancel", "POST", { zone }).then(applyState) }, t("stop_override")));
    } else {
      durations = h("div", { class: "override-row" },
        ...PRESETS.map(min => h("button",
          { onclick: () => send("api/override", "POST", { zone, minutes: min }).then(applyState) },
          t("preset_minutes", { n: min }))),
        h("button", { class: "alt", title: t("custom_minutes_title"), html: ICON_STOPWATCH,
          onclick: () => {
            const mins = parseInt(prompt(t("custom_minutes_prompt"), "45"), 10);
            if (mins > 0) send("api/override", "POST", { zone, minutes: mins }).then(applyState);
          } }));
    }

    // The device's accepted setpoint range (from HA's min_temp/max_temp). A
    // value above max_temp is silently rejected by HA, so every path that sets
    // the override target clamps into [lo, hi] first.
    const [lo, hi] = zoneBounds(zone);
    // Skip a redundant PUT when the value hasn't actually moved since the last
    // send (e.g. a blur right after the +/- buttons already committed). Seeded
    // with the rendered value so merely focusing and tabbing away sends nothing.
    let lastSent = Math.round(Number(status.override_temp) * 10) / 10;
    const commitOverrideTemp = (value) => {
      // Round to the 0.1 grid (so float drift never leaks a 21.30000001) and
      // clamp into the device range. Garbage input is ignored — the re-render
      // restores the previous display.
      let newVal = Math.round(Number(value) * 10) / 10;
      if (!Number.isFinite(newVal) || newVal === lastSent) return;
      newVal = Math.min(hi, Math.max(lo, newVal));
      lastSent = newVal;
      send("api/settings", "PUT", { zone, override_temp: newVal }).then(applyState);
    };

    // The setpoint is an always-visible number field: type an exact target and
    // commit on Enter or blur, or nudge by 0.1 with the +/- buttons. Focusing
    // marks the zone busy so the 5s poll can't yank the field away mid-edit;
    // blur clears it. Escape reverts to the last rendered value.
    const input = h("input", { class: "val-input", type: "number", inputmode: "decimal",
      min: lo, max: hi, step: "0.1", value: status.override_temp,
      title: t("edit_override_temp"), "aria-label": t("edit_override_temp"),
      onfocus: () => busy.add(zone),
      onblur: () => { busy.delete(zone); commitOverrideTemp(input.value); },
      onkeydown: (ev) => {
        if (ev.key === "Enter") { ev.preventDefault(); input.blur(); }
        else if (ev.key === "Escape") { ev.preventDefault(); input.value = status.override_temp; input.blur(); }
      } });
    // The +/- buttons nudge the committed setpoint by 0.1; the PUT response
    // re-renders the field with the confirmed value (no optimistic write, so a
    // slow/out-of-order response can't leave a stale number on screen).
    const nudge = (delta) => commitOverrideTemp(Number(status.override_temp) + delta);
    // mousedown preventDefault keeps focus on the field while nudging, so it
    // doesn't blur-commit and then nudge from a stale value mid-click.
    const nudgeBtn = (label, delta) => h("button",
      { onmousedown: (ev) => ev.preventDefault(), onclick: () => nudge(delta) }, label);
    const stepper = h("div", { class: "stepper" }, nudgeBtn("−", -0.1), input, nudgeBtn("+", 0.1));

    body = h("fieldset", { class: "override" },
      h("legend", null, t("override")),
      h("div", { class: "override-controls" }, durations, stepper));
  }

  const today = Array.isArray(status.today) ? status.today : [];
  const todayStrip = today.length
    ? h("div", { class: "today" }, ...today.map((step, i) => {
        const isNow = i === status.now_index;
        // The accent-coloured ▶ marks the period in effect now; the title
        // explains the highlight on hover and aria-label gives screen readers
        // the meaning instead of reading the glyph as "play".
        return h("span", { class: "step" + (isNow ? " now" : ""), title: isNow ? t("now_period") : null },
          isNow ? h("span", { class: "now-marker", "aria-label": t("now_period") }, "▶ ") : null,
          fmtTime(step.time) + " " + step.temp + "°");
      }))
    : h("div", { class: "today" }, t("no_schedule"));

  const card = h("div", { class: "card", "data-zone": zone }, head, body, todayStrip);
  card.append(h("button", { class: "edit-btn",
    onclick: () => {
      if (busy.has(zone)) return;          // ignore clicks while opening or closing
      if (editing.has(zone)) closeEditor(zone, card, lastState);
      else openEditor(zone, card);
    } },
    h("span", { class: "ico", "aria-hidden": "true", html: ICON_PENCIL }),
    h("span", null, t("edit_schedule"))));
  return card;
}

function normalizeDays(days) {
  const out = {};
  for (let d = 0; d < 7; d++) {
    const list = days && days[String(d)];
    out[d] = Array.isArray(list) ? list.slice() : [];
  }
  return out;
}

// Mark the zone busy for the whole open: this both blocks a second click and,
// crucially, suppresses poll()/render() during the fetch gap — without it a
// poll could rebuild every card mid-fetch and detach the `card` this editor is
// appended to, desyncing the open/close toggle. editing is set before the busy
// flag clears so polling stays suppressed once the editor is on screen.
async function openEditor(zone, card) {
  busy.add(zone);
  try {
    const resp = await fetch("./api/schedule?zone=" + encodeURIComponent(zone));
    if (!resp.ok) { showErr(t("load_schedule_failed")); return; }
    const data = await resp.json();
    editing.add(zone);
    renderEditor(zone, entriesFromDays(normalizeDays(data.days)), card);
    slideOpen(card.querySelector(".editor"));
  } finally {
    busy.delete(zone);
  }
}

const REDUCED_MOTION = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const CAN_ANIMATE = (el) => !REDUCED_MOTION && el && typeof el.animate === "function";

// Keyframes that fully collapse the box: max-height *and* the top margin,
// border, and padding (which sit outside max-height), so the element reaches a
// true zero height with nothing left to snap away. Endpoints are read from the
// element's resolved style so the open/close motion always starts and ends at
// the real stylesheet values.
function collapseFrames(el) {
  const cs = getComputedStyle(el);
  return [
    { maxHeight: el.scrollHeight + "px", opacity: 1,
      marginTop: cs.marginTop, paddingTop: cs.paddingTop, borderTopWidth: cs.borderTopWidth },
    { maxHeight: "0px", opacity: 0,
      marginTop: "0px", paddingTop: "0px", borderTopWidth: "0px" },
  ];
}

// Grow an element from collapsed to its natural height (and fade in). The Web
// Animations API doesn't depend on style-commit timing the way a max-height
// transition does, so the motion is reliable; overflow is clipped only for the
// duration so mid-animation content can't spill.
function slideOpen(el) {
  if (!CAN_ANIMATE(el)) return;
  el.style.overflow = "hidden";
  const anim = el.animate(collapseFrames(el).reverse(), { duration: 220, easing: "ease" });
  anim.onfinish = anim.oncancel = () => { el.style.overflow = ""; };
}

// Collapse an element to zero height (and fade out), then run after() exactly
// once. after() advances the editor state machine, so onfinish/oncancel both
// route to it; fill:"forwards" holds the collapsed frame until after() swaps
// the element out, so it never flashes back to full height at the end.
function slideClose(el, after) {
  if (!CAN_ANIMATE(el) || !el.scrollHeight) { after(); return; }
  el.style.overflow = "hidden";
  const anim = el.animate(collapseFrames(el), { duration: 200, easing: "ease", fill: "forwards" });
  let done = false;
  const finish = () => { if (!done) { done = true; after(); } };
  anim.onfinish = finish;
  anim.oncancel = finish;
}

// Close one card's editor without touching the others: collapse the editor,
// then drop the zone from the editing set and rebuild just this card from the
// given state. Keeping the zone in editing until the animation ends stops a
// poll from rebuilding (and snapping away) the card mid-collapse. render()'s
// full rebuild is suppressed while any editor is still open.
function closeEditor(zone, card, state) {
  busy.add(zone);
  const ed = card.querySelector(".editor");
  slideClose(ed, () => {
    editing.delete(zone);
    busy.delete(zone);
    if (state && state.zones[zone]) {
      card.replaceWith(zoneCard(zone, state.zones[zone]));
    } else if (ed) {
      ed.remove();
    }
  });
}

// Collapse the per-day schedule into editor entries, reusing the Mon–Fri
// and Sat–Sun groups whenever a transition is shared across all of them.
function entriesFromDays(days) {
  const byTransition = new Map();
  const order = [];
  for (let d = 0; d < 7; d++) {
    days[d].forEach(transition => {
      const key = transition.time + "|" + transition.temp;
      if (!byTransition.has(key)) {
        byTransition.set(key, { time: transition.time, temp: transition.temp, presentDays: new Set() });
        order.push(key);
      }
      byTransition.get(key).presentDays.add(d);
    });
  }
  const entries = [];
  order.forEach(key => {
    const { time, temp, presentDays } = byTransition.get(key);
    const remaining = new Set(presentDays);
    if ([0, 1, 2, 3, 4, 5, 6].every(d => remaining.has(d))) {
      entries.push({ group: "everyday", time, temp });
      remaining.clear();
    }
    if ([0, 1, 2, 3, 4].every(d => remaining.has(d))) {
      entries.push({ group: "weekdays", time, temp });
      [0, 1, 2, 3, 4].forEach(d => remaining.delete(d));
    }
    if ([5, 6].every(d => remaining.has(d))) {
      entries.push({ group: "weekend", time, temp });
      [5, 6].forEach(d => remaining.delete(d));
    }
    [...remaining].sort((a, b) => a - b).forEach(d => entries.push({ group: String(d), time, temp }));
  });
  entries.sort((a, b) => a.time.localeCompare(b.time));
  return entries;
}

// Expand editor entries back into the per-day payload the backend expects.
function daysFromEntries(entries) {
  const days = {};
  for (let d = 0; d < 7; d++) days[String(d)] = [];
  entries.forEach(entry => {
    const group = DAY_GROUPS.find(candidate => candidate.value === entry.group);
    if (!group) return;
    group.days.forEach(d => days[String(d)].push({ time: entry.time, temp: entry.temp }));
  });
  for (let d = 0; d < 7; d++) days[String(d)].sort((a, b) => a.time.localeCompare(b.time));
  return days;
}

function renderEditor(zone, entries, card) {
  const existing = card.querySelector(".editor");
  if (existing) existing.remove();
  card.append(h("div", { class: "editor" },
    ...entries.map((entry, i) => entryRow(entries, i, zone, card)),
    h("button", { class: "add", onclick: () => {
      entries.push({ group: "weekdays", time: "07:00", temp: 21 });
      renderEditor(zone, entries, card);
    } }, t("add_entry")),
    h("div", { class: "editor-actions" },
      h("button", { class: "save", onclick: async () => {
        const newState = await send("api/schedule", "PUT", { zone, days: daysFromEntries(entries) });
        if (newState) { lastState = newState; closeEditor(zone, card, newState); }
      } }, t("save")),
      h("button", { class: "cancel", onclick: () => closeEditor(zone, card, lastState) }, t("cancel")))));
}

function entryRow(entries, i, zone, card) {
  const entry = entries[i];
  // Multi-day groups (Mon–Fri, Sat–Sun) and individual days go in separate
  // optgroups so the two kinds of choice read as distinct.
  const sections = [
    { label: t("daygroup.combined"), items: DAY_GROUPS.filter(group => group.days.length > 1) },
    { label: t("daygroup.individual"), items: DAY_GROUPS.filter(group => group.days.length === 1) },
  ];
  const daySelect = h("select", { onchange: (ev) => { entry.group = ev.target.value; } },
    ...sections.map(section => h("optgroup", { label: section.label },
      ...section.items.map(group =>
        h("option", { value: group.value, selected: group.value === entry.group }, t("day." + group.value))))));
  const time = h("input", { type: "time", value: entry.time,
    onchange: (ev) => { entry.time = ev.target.value; } });
  const [lo, hi] = zoneBounds(zone);
  const temp = h("input", { type: "number", min: lo, max: hi, step: "0.1", value: entry.temp,
    onchange: (ev) => { entry.temp = Math.min(hi, Math.max(lo, Number(ev.target.value))); ev.target.value = entry.temp; } });
  const rm = h("button", { class: "rm",
    onclick: () => { entries.splice(i, 1); renderEditor(zone, entries, card); } }, "✕");
  return h("div", { class: "row" }, daySelect, time, temp, rm);
}

// Tick the live override countdowns once a second between polls.
setInterval(() => {
  document.querySelectorAll(".cd[data-ends]").forEach(el => {
    el.textContent = fmtCountdown((Number(el.dataset.ends) - Date.now()) / 1000);
  });
}, 1000);

// Localize the static document chrome that ships in the HTML before the
// first poll replaces #app.
document.documentElement.lang = LOCALE;
document.title = t("title");
document.querySelector("h1").textContent = t("title");
const placeholder = document.querySelector("#app .today");
if (placeholder) placeholder.textContent = t("loading");

// Build the language picker. Switching stores the choice and reloads to a
// URL without ?lang= so the stored preference (not the param) takes effect.
const langSelect = document.getElementById("lang");
Object.keys(MESSAGES).forEach(code =>
  langSelect.append(h("option", { value: code, selected: code === LOCALE }, LANG_NAMES[code] || code)));
langSelect.onchange = () => {
  localStorage.setItem("lang", langSelect.value);
  location.assign(location.pathname);
};

poll();
setInterval(poll, 5000);
</script>
</body>
</html>
