<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Heating</title>
<style>
  /* Neutrals share one hue (262); the ramp is pure lightness steps. The
     accent is the only standalone chromatic anchor, and --now is derived
     from it so the highlight tint tracks the accent's hue automatically. */
  :root { color-scheme: light dark;
          --bg:oklch(0.970 0.003 262); --card:oklch(1 0 0);
          --ink:oklch(0.234 0.007 262); --muted:oklch(0.573 0.008 262);
          --accent:oklch(0.642 0.187 31); --accent-ink:oklch(1 0 0);
          --line:oklch(0.921 0.005 262); --btn:oklch(0.958 0.003 262);
          --link:oklch(0.581 0.229 263);
          --now:oklch(from var(--accent) 0.968 0.016 h);
          --btn-ink:var(--ink); --surface:var(--card); }
  @media (prefers-color-scheme: dark) {
    :root { --bg:oklch(0.204 0.007 262); --card:oklch(0.259 0.010 262);
            --ink:oklch(0.928 0.003 262); --muted:oklch(0.695 0.009 262);
            --line:oklch(0.336 0.011 262); --btn:oklch(0.305 0.012 262);
            --link:oklch(0.729 0.141 258);
            --now:oklch(from var(--accent) 0.294 0.030 h);
            --surface:var(--btn); }
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:16px/1.4 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
         padding:12px; max-width:600px; margin:0 auto; }
  h1 { font-size:1.3rem; margin:8px 4px 16px; }
  .topbar { display:flex; align-items:baseline; justify-content:space-between; gap:8px; }
  #lang { padding:6px 8px; border:1px solid var(--line); border-radius:8px;
          background:var(--surface); color:var(--ink); cursor:pointer; }
  .card { background:var(--card); border-radius:14px; padding:14px;
          margin-bottom:14px; box-shadow:0 1px 3px rgba(0,0,0,.08); }
  .head { display:flex; justify-content:space-between; align-items:baseline;
          margin-bottom:12px; }
  .zone { font-weight:600; font-size:1.1rem; }
  .status { color:var(--muted); font-size:.95rem; }
  .status b { color:var(--ink); }
  .boost-row { display:flex; gap:8px; margin-bottom:12px; }
  .boost-row button { flex:1; padding:16px 0; font-size:1.1rem; font-weight:600;
          border:none; border-radius:10px; background:var(--accent);
          color:var(--accent-ink); cursor:pointer; }
  .boost-row button.alt { background:var(--btn); color:var(--btn-ink); flex:0 0 56px; }
  .boosting { display:flex; align-items:center; gap:12px; margin-bottom:12px;
          background:var(--now); border-radius:10px; padding:12px; }
  .boosting .cd { font-size:1.4rem; font-weight:700; font-variant-numeric:tabular-nums; }
  .boosting button { margin-left:auto; padding:10px 16px; border:none;
          border-radius:8px; background:var(--surface); color:var(--ink); cursor:pointer; }
  .stepper { display:flex; align-items:center; gap:14px; margin-bottom:12px; }
  .stepper .lbl { color:var(--muted); }
  .stepper button { width:44px; height:44px; font-size:1.4rem; border:1px solid var(--line);
          border-radius:10px; background:var(--surface); color:var(--ink); cursor:pointer; }
  .stepper .val { font-size:1.3rem; font-weight:600; min-width:60px; text-align:center; }
  .today { display:flex; flex-wrap:wrap; gap:6px 10px; font-size:.9rem;
           color:var(--muted); margin-bottom:8px; }
  .today .step.now { color:var(--accent); font-weight:700; }
  .muted { color:var(--muted); font-style:italic; margin-bottom:8px; }
  .edit-btn { display:flex; align-items:center; justify-content:center; gap:8px;
              width:100%; margin-top:4px; padding:11px; font-size:.95rem; font-weight:600;
              border:1px solid var(--line); border-radius:10px; user-select:none;
              background:var(--btn); color:var(--btn-ink); cursor:pointer; }
  .edit-btn .ico { font-size:1.15rem; line-height:1; }
  .editor { border-top:1px solid var(--line); margin-top:12px; padding-top:12px; }
  .row { display:flex; gap:8px; align-items:center; margin-bottom:6px; }
  .row select { padding:8px; border:1px solid var(--line); border-radius:8px;
            background:var(--surface); color:var(--ink); }
  .row input[type=time] { flex:1; padding:8px; border:1px solid var(--line); border-radius:8px;
            background:var(--surface); color:var(--ink); }
  .row input[type=number] { width:80px; padding:8px; border:1px solid var(--line); border-radius:8px;
            background:var(--surface); color:var(--ink); }
  .row .rm, .editor .add { border:none; background:var(--btn); color:var(--btn-ink); border-radius:8px;
            padding:8px 12px; cursor:pointer; }
  .editor .add { display:block; margin-bottom:8px; }
  .editor-actions { display:flex; gap:8px; margin-top:8px; }
  .editor-actions button { flex:1; padding:12px; border:none; border-radius:10px;
            font-weight:600; cursor:pointer; }
  .editor-actions .save { background:var(--accent); color:var(--accent-ink); }
  .editor-actions .cancel { background:var(--btn); color:var(--btn-ink); }
  #err { position:fixed; left:12px; right:12px; bottom:12px; background:#c0392b;
         color:#fff; padding:12px; border-radius:10px; display:none; }
  .skel { display:inline-block; background:var(--line); border-radius:8px;
          animation:pulse 1.2s ease-in-out infinite; }
  .skel-text { height:1.1rem; vertical-align:middle; }
  .head .skel-text.zone { width:90px; }
  .head .skel-text.status { width:60px; }
  .boost-row .skel-btn { flex:1; height:52px; border-radius:10px; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.45; } }
</style>
</head>
<body>
<header class="topbar"><h1>Heating</h1><select id="lang" aria-label="Language"></select></header>
<div id="app">
  <div class="card placeholder">
    <div class="head"><span class="zone skel skel-text"></span><span class="status skel skel-text"></span></div>
    <div class="boost-row"><span class="skel skel-btn"></span><span class="skel skel-btn"></span><span class="skel skel-btn"></span></div>
    <div class="today">loading…</div>
  </div>
</div>
<div id="err"></div>
<script>
const PRESETS = [10, 30, 60];

// UI strings keyed by locale. {name} placeholders are filled in by t().
const MESSAGES = {
  en: {
    "title": "Heating",
    "loading": "loading…",
    "not_controlled": "mode {mode} — not controlled",
    "boosting_to": "boosting to {temp}°",
    "stop_boost": "cancel",
    "preset_minutes": "{n}m",
    "custom_minutes_title": "custom minutes",
    "custom_minutes_prompt": "Boost for how many minutes?",
    "boost_to": "boost to",
    "no_schedule": "no schedule set",
    "edit_schedule": "Edit schedule",
    "add_entry": "+ add entry",
    "save": "Save",
    "cancel": "Cancel",
    "load_schedule_failed": "Could not load schedule",
    "http_error": "Error {status}: {msg}",
    "mode.heat": "heat", "mode.off": "off", "mode.cool": "cool",
    "mode.auto": "auto", "mode.idle": "idle", "mode.unknown": "unknown",
    "day.weekdays": "Mon–Fri", "day.weekend": "Sat–Sun",
    "day.0": "Monday", "day.1": "Tuesday", "day.2": "Wednesday",
    "day.3": "Thursday", "day.4": "Friday", "day.5": "Saturday", "day.6": "Sunday",
  },
  hu: {
    "title": "Fűtés",
    "loading": "betöltés…",
    "not_controlled": "{mode} mód — nincs vezérelve",
    "boosting_to": "rásegítés {temp}°-ra",
    "stop_boost": "leállítás",
    "preset_minutes": "{n}p",
    "custom_minutes_title": "egyéni időtartam",
    "custom_minutes_prompt": "Hány percig segítsen rá?",
    "boost_to": "rásegítés",
    "no_schedule": "nincs beállított ütemezés",
    "edit_schedule": "Ütemezés szerkesztése",
    "add_entry": "+ új bejegyzés",
    "save": "Mentés",
    "cancel": "Mégse",
    "load_schedule_failed": "Az ütemezés betöltése sikertelen",
    "http_error": "Hiba {status}: {msg}",
    "mode.heat": "fűtés", "mode.off": "ki", "mode.cool": "hűtés",
    "mode.auto": "automatikus", "mode.idle": "tétlen", "mode.unknown": "ismeretlen",
    "day.weekdays": "Hétköznap", "day.weekend": "Hétvége",
    "day.0": "Hétfő", "day.1": "Kedd", "day.2": "Szerda",
    "day.3": "Csütörtök", "day.4": "Péntek", "day.5": "Szombat", "day.6": "Vasárnap",
  },
};

// Native names shown in the language picker, one per MESSAGES locale.
const LANG_NAMES = { en: "English", hu: "Magyar" };

// Resolve the locale once: ?lang= overrides and is remembered, otherwise the
// stored choice, otherwise the browser language. Anything we can't serve
// falls back to English.
const LOCALE = (() => {
  const param = new URLSearchParams(location.search).get("lang");
  if (param) localStorage.setItem("lang", param);
  const pref = (param || localStorage.getItem("lang") || navigator.language || "en").toLowerCase();
  return MESSAGES[pref.slice(0, 2)] ? pref.slice(0, 2) : "en";
})();

function t(key, params, fallback) {
  const table = MESSAGES[LOCALE] || MESSAGES.en;
  let str = table[key];
  if (str == null) str = MESSAGES.en[key];
  if (str == null) str = (fallback != null ? fallback : key);
  if (params) str = str.replace(/\{(\w+)\}/g, (whole, name) => params[name] != null ? params[name] : whole);
  return str;
}

// hvac modes come straight from Home Assistant; show the raw value when we
// have no translation for it.
const modeLabel = (mode) => t("mode." + mode, null, mode);

// Each editor entry targets one of these day groups; .days lists the
// underlying 0=Mon..6=Sun indices the entry expands to on save. Labels are
// resolved through t() under the "day.<value>" keys.
const DAY_GROUPS = [
  { value: "weekdays", days: [0, 1, 2, 3, 4] },
  { value: "weekend",  days: [5, 6] },
  { value: "0", days: [0] },
  { value: "1", days: [1] },
  { value: "2", days: [2] },
  { value: "3", days: [3] },
  { value: "4", days: [4] },
  { value: "5", days: [5] },
  { value: "6", days: [6] },
];
const editing = new Set();  // zones with an open schedule editor (suppresses polling)
let lastState = null;

const $ = (html) => { const div = document.createElement("div"); div.innerHTML = html.trim(); return div.firstChild; };
const esc = (value) => String(value).replace(/[&<>"]/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[ch]));
const title = (zone) => zone.charAt(0).toUpperCase() + zone.slice(1).replace(/_/g, " ");

function showErr(msg) {
  const errEl = document.getElementById("err");
  errEl.textContent = msg; errEl.style.display = "block";
  setTimeout(() => { errEl.style.display = "none"; }, 4000);
}

async function send(path, method, payload) {
  const resp = await fetch("./" + path, {
    method, headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });
  if (!resp.ok) { showErr(t("http_error", { status: resp.status, msg: await resp.text() })); return null; }
  return resp.json();
}

async function poll() {
  if (editing.size) return;            // don't clobber an open editor
  try {
    const resp = await fetch("./api/state");
    if (resp.ok) { lastState = await resp.json(); render(lastState); }
  } catch (err) { /* transient; next poll retries */ }
}

function fmtCountdown(sec) {
  sec = Math.max(0, Math.floor(sec));
  const minutes = Math.floor(sec / 60), seconds = sec % 60;
  return minutes + ":" + String(seconds).padStart(2, "0");
}

function render(state) {
  if (editing.size) return;
  const app = document.getElementById("app");
  app.innerHTML = "";
  Object.keys(state.zones).sort().forEach(zone => app.appendChild(zoneCard(zone, state.zones[zone])));
}

function zoneCard(zone, status) {
  const card = document.createElement("div");
  card.className = "card";

  const current = (status.current_temp != null) ? status.current_temp.toFixed(1) + "°" : "";
  card.appendChild($(
    '<div class="head"><span class="zone">' + esc(title(zone)) + '</span>' +
    '<span class="status"><b>' + esc(modeLabel(status.mode)) + '</b> ' + current + '</span></div>'
  ));

  const controllable = status.mode === "heat";
  if (!controllable) {
    card.appendChild($('<div class="muted">' + esc(t("not_controlled", { mode: modeLabel(status.mode) })) + '</div>'));
  } else if (status.boost && status.boost.active) {
    const ends = Date.now() + (status.boost.remaining_s || 0) * 1000;
    const row = $('<div class="boosting"><span class="cd" data-ends="' + ends + '">' +
      fmtCountdown(status.boost.remaining_s || 0) + '</span><span>' +
      esc(t("boosting_to", { temp: status.comfort_temp })) + '</span><button>' +
      esc(t("stop_boost")) + '</button></div>');
    row.querySelector("button").onclick = () =>
      send("api/boost/cancel", "POST", { zone: zone }).then(newState => newState && (lastState = newState, render(newState)));
    card.appendChild(row);
  } else {
    const row = document.createElement("div");
    row.className = "boost-row";
    PRESETS.forEach(min => {
      const btn = $('<button>' + esc(t("preset_minutes", { n: min })) + '</button>');
      btn.onclick = () => send("api/boost", "POST", { zone: zone, minutes: min })
        .then(newState => newState && (lastState = newState, render(newState)));
      row.appendChild(btn);
    });
    const custom = $('<button class="alt">⌨</button>');
    custom.title = t("custom_minutes_title");
    custom.onclick = () => {
      const minutesInput = prompt(t("custom_minutes_prompt"), "45");
      const mins = parseInt(minutesInput, 10);
      if (mins > 0) send("api/boost", "POST", { zone: zone, minutes: mins })
        .then(newState => newState && (lastState = newState, render(newState)));
    };
    row.appendChild(custom);
    card.appendChild(row);
  }

  if (controllable) {
    const step = document.createElement("div");
    step.className = "stepper";
    step.appendChild($('<span class="lbl">' + esc(t("boost_to")) + '</span>'));
    const minus = $('<button>−</button>'), plus = $('<button>+</button>');
    const val = $('<span class="val">' + esc(status.comfort_temp) + '°</span>');
    const setComfort = (delta) => {
      const newVal = Math.round((Number(status.comfort_temp) + delta) * 2) / 2;
      send("api/settings", "PUT", { zone: zone, comfort_temp: newVal })
        .then(newState => newState && (lastState = newState, render(newState)));
    };
    minus.onclick = () => setComfort(-0.5);
    plus.onclick = () => setComfort(0.5);
    step.appendChild(minus); step.appendChild(val); step.appendChild(plus);
    card.appendChild(step);
  }

  const today = Array.isArray(status.today) ? status.today : [];
  if (today.length) {
    const strip = today.map((step, i) =>
      '<span class="step' + (i === status.now_index ? " now" : "") + '">' +
      (i === status.now_index ? "▶ " : "") + esc(step.time) + " " + esc(step.temp) + "°</span>"
    ).join("");
    card.appendChild($('<div class="today">' + strip + '</div>'));
  } else {
    card.appendChild($('<div class="today">' + esc(t("no_schedule")) + '</div>'));
  }

  const edit = $('<button class="edit-btn"><span class="ico" aria-hidden="true">✎</span><span>' +
    esc(t("edit_schedule")) + '</span></button>');
  edit.onclick = () => openEditor(zone, card);
  card.appendChild(edit);
  return card;
}

function normalizeDays(days) {
  const out = {};
  for (let d = 0; d < 7; d++) {
    const list = days && days[String(d)];
    out[d] = Array.isArray(list) ? list.slice() : [];
  }
  return out;
}

async function openEditor(zone, card) {
  const resp = await fetch("./api/schedule?zone=" + encodeURIComponent(zone));
  if (!resp.ok) { showErr(t("load_schedule_failed")); return; }
  const data = await resp.json();
  editing.add(zone);
  renderEditor(zone, entriesFromDays(normalizeDays(data.days)), card);
}

// Close one card's editor without touching the others: drop it from the
// editing set and rebuild just this card from the given state. render()'s
// full rebuild is suppressed while any other editor is still open.
function closeEditor(zone, card, state) {
  editing.delete(zone);
  if (state && state.zones[zone]) {
    card.replaceWith(zoneCard(zone, state.zones[zone]));
  } else {
    const ed = card.querySelector(".editor");
    if (ed) ed.remove();
  }
}

// Collapse the per-day schedule into editor entries, reusing the Mon–Fri
// and Sat–Sun groups whenever a transition is shared across all of them.
function entriesFromDays(days) {
  const byTransition = new Map();
  const order = [];
  for (let d = 0; d < 7; d++) {
    days[d].forEach(transition => {
      const key = transition.time + "|" + transition.temp;
      if (!byTransition.has(key)) {
        byTransition.set(key, { time: transition.time, temp: transition.temp, presentDays: new Set() });
        order.push(key);
      }
      byTransition.get(key).presentDays.add(d);
    });
  }
  const entries = [];
  order.forEach(key => {
    const { time, temp, presentDays } = byTransition.get(key);
    const remaining = new Set(presentDays);
    if ([0, 1, 2, 3, 4].every(d => remaining.has(d))) {
      entries.push({ group: "weekdays", time, temp });
      [0, 1, 2, 3, 4].forEach(d => remaining.delete(d));
    }
    if ([5, 6].every(d => remaining.has(d))) {
      entries.push({ group: "weekend", time, temp });
      [5, 6].forEach(d => remaining.delete(d));
    }
    [...remaining].sort((a, b) => a - b).forEach(d => entries.push({ group: String(d), time, temp }));
  });
  entries.sort((a, b) => a.time.localeCompare(b.time));
  return entries;
}

// Expand editor entries back into the per-day payload the backend expects.
function daysFromEntries(entries) {
  const days = {};
  for (let d = 0; d < 7; d++) days[String(d)] = [];
  entries.forEach(entry => {
    const group = DAY_GROUPS.find(candidate => candidate.value === entry.group);
    if (!group) return;
    group.days.forEach(d => days[String(d)].push({ time: entry.time, temp: entry.temp }));
  });
  for (let d = 0; d < 7; d++) days[String(d)].sort((a, b) => a.time.localeCompare(b.time));
  return days;
}

function renderEditor(zone, entries, card) {
  let ed = card.querySelector(".editor");
  if (ed) ed.remove();
  ed = document.createElement("div");
  ed.className = "editor";

  entries.forEach((entry, i) => ed.appendChild(entryRow(entries, i, zone, card)));

  const add = $('<button class="add">' + esc(t("add_entry")) + '</button>');
  add.onclick = () => { entries.push({ group: "weekdays", time: "07:00", temp: 21 }); renderEditor(zone, entries, card); };
  ed.appendChild(add);

  const actions = document.createElement("div");
  actions.className = "editor-actions";
  const save = $('<button class="save">' + esc(t("save")) + '</button>');
  const cancel = $('<button class="cancel">' + esc(t("cancel")) + '</button>');
  save.onclick = async () => {
    const newState = await send("api/schedule", "PUT", { zone: zone, days: daysFromEntries(entries) });
    if (newState) { lastState = newState; closeEditor(zone, card, newState); }
  };
  cancel.onclick = () => { closeEditor(zone, card, lastState); };
  actions.appendChild(save); actions.appendChild(cancel);
  ed.appendChild(actions);
  card.appendChild(ed);
}

function entryRow(entries, i, zone, card) {
  const entry = entries[i];
  const row = document.createElement("div");
  row.className = "row";
  const daySelect = document.createElement("select");
  DAY_GROUPS.forEach(group => {
    const option = document.createElement("option");
    option.value = group.value;
    option.textContent = t("day." + group.value);
    if (group.value === entry.group) option.selected = true;
    daySelect.appendChild(option);
  });
  daySelect.onchange = () => { entry.group = daySelect.value; };
  const time = $('<input type="time" value="' + esc(entry.time) + '">');
  const temp = $('<input type="number" min="5" max="35" step="0.1" value="' + esc(entry.temp) + '">');
  time.onchange = () => { entry.time = time.value; };
  temp.onchange = () => { entry.temp = Number(temp.value); };
  const rm = $('<button class="rm">✕</button>');
  rm.onclick = () => { entries.splice(i, 1); renderEditor(zone, entries, card); };
  row.appendChild(daySelect); row.appendChild(time); row.appendChild(temp); row.appendChild(rm);
  return row;
}

// Tick the live boost countdowns once a second between polls.
setInterval(() => {
  document.querySelectorAll(".cd[data-ends]").forEach(el => {
    el.textContent = fmtCountdown((Number(el.dataset.ends) - Date.now()) / 1000);
  });
}, 1000);

// Localize the static document chrome that ships in the HTML before the
// first poll replaces #app.
document.documentElement.lang = LOCALE;
document.title = t("title");
document.querySelector("h1").textContent = t("title");
const placeholder = document.querySelector("#app .today");
if (placeholder) placeholder.textContent = t("loading");

// Build the language picker. Switching stores the choice and reloads to a
// URL without ?lang= so the stored preference (not the param) takes effect.
const langSelect = document.getElementById("lang");
Object.keys(MESSAGES).forEach(code => {
  const option = document.createElement("option");
  option.value = code;
  option.textContent = LANG_NAMES[code] || code;
  if (code === LOCALE) option.selected = true;
  langSelect.appendChild(option);
});
langSelect.onchange = () => {
  localStorage.setItem("lang", langSelect.value);
  location.assign(location.pathname);
};

poll();
setInterval(poll, 5000);
</script>
</body>
</html>
