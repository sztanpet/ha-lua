name: "HA Lua"
description: "Lua scripting engine for Home Assistant"
version: "1.0.0"
slug: "ha-lua"
init: false
arch:
  - aarch64
  - amd64
homeassistant_api: true        # provides $SUPERVISOR_TOKEN + ws://supervisor/core/websocket
startup: services
boot: auto
map:
  - addon_config:rw            # /addon_config inside container = /config/ha-lua on host
options:
  log_level: "info"
  timezone: ""
  state_history:
    retention_days: 2
    purge_interval: "1h"
  debug:
    pprof_addr: ""
schema:
  log_level: "str"
  timezone: "str?"
  state_history:
    retention_days: "int"
    purge_interval: "str"
  debug:
    pprof_addr: "str?"
