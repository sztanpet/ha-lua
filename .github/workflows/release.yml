name: Release

# Build multi-arch add-on images and push them to GHCR on every version tag.
# The image version comes from config.yaml; keep its `version:` field in sync
# with the tag (and with CHANGELOG.md) before tagging.
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, amd64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.arch }}
        uses: home-assistant/builder@2026.06.0
        with:
          args: |
            --${{ matrix.arch }} \
            --target /data \
            --image "ha-lua-{arch}" \
            --docker-hub "ghcr.io/${{ github.repository_owner }}" \
            --addon
