name: Release

# Build multi-arch add-on images and push them to GHCR on every version tag.
# The image version comes from ha-lua/config.yaml; keep its `version:` field in
# sync with the tag (and with ha-lua/CHANGELOG.md) before tagging.
#
# Uses home-assistant/builder's composable actions (the monolithic
# home-assistant/builder action is deprecated). Each arch builds natively on
# its own runner (amd64 -> ubuntu-24.04, aarch64 -> ubuntu-24.04-arm), so the
# Dockerfile's plain `go build` produces the correct binary without emulation.
on:
  push:
    tags:
      - "v*"

env:
  ARCHITECTURES: '["amd64", "aarch64"]'
  IMAGE_NAME: ha-lua

permissions:
  contents: read

jobs:
  init:
    name: Initialize build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Get build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.06.0
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}

  build:
    name: Build ${{ matrix.arch }}
    needs: init
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read # check out the source
      id-token: write # issue the OIDC token Cosign signs with
      packages: write # push the per-arch image to GHCR
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and push ${{ matrix.arch }}
        uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          arch: ${{ matrix.arch }}
          image: ${{ matrix.image }}
          context: ha-lua          # add-on (and Docker build context) lives here
          image-tags: |
            ${{ needs.init.outputs.version }}
            latest
          version: ${{ needs.init.outputs.version }}
          push: "true"
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}

  manifest:
    name: Publish multi-arch manifest
    needs: [init, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # issue the OIDC token Cosign signs with
      packages: write # push the combined manifest to GHCR
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.06.0
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tags: |
            ${{ needs.init.outputs.version }}
            latest
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
